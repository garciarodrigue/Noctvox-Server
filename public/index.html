<!DOCTYPE html>
<html>

<head>

<title>SYPH // NVX AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
margin:0;
}

#chat{
width:700px;
height:450px;
overflow-y:auto;
border:1px solid #334155;
padding:15px;
margin-top:20px;
background:#020617;
border-radius:8px;
}

.message{
margin:10px 0;
}

.user{
color:#38bdf8;
}

.ai{
color:#22c55e;
}

input{
width:500px;
padding:10px;
}

button{
padding:10px;
}

</style>

</head>

<body>

<h2>SYPH // NVX</h2>

<div id="chat"></div>

<div>

<input id="input" placeholder="Habla con la IA">
<button onclick="send()">Enviar</button>

</div>

<script>

function speak(text){

const speech = new SpeechSynthesisUtterance(text);

speech.lang="es-ES";

speechSynthesis.speak(speech);

}

function typeText(element,text,speed=20){

let i=0;

function typing(){

if(i<text.length){

element.innerHTML+=text.charAt(i);

i++;

setTimeout(typing,speed);

}

}

typing();

}

async function send(){

const input=document.getElementById("input");

const chat=document.getElementById("chat");

const text=input.value.trim();

if(!text) return;

chat.innerHTML+=`<div class="message user">Tu: ${text}</div>`;

input.value="";

const res=await fetch("/ai",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

prompt:text,
userId:"sypherion"

})

});

const data=await res.json();

const aiMessage=document.createElement("div");

aiMessage.className="message ai";

chat.appendChild(aiMessage);

typeText(aiMessage,"IA: "+data.response);

speak(data.response);

chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
</html>
